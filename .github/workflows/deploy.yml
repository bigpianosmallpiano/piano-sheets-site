name: Daily YouTube Sync & Deploy

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    name: Fetch YouTube data → Build → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests

      - name: Sync YouTube videos and parse scores
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: python fetch_and_parse.py

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Commit updated data files
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/data/
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore: sync YouTube data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./dist
          production-branch: main
          production-deploy: true
          deploy-message: "Auto-deploy ${{ github.sha }}"
          enable-commit-comment: false
          enable-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_T
